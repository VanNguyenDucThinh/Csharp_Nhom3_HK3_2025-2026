name: .NET CI Pipeline

# Trigger: Tự động chạy khi có code mới đẩy lên nhánh main hoặc có Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub (miễn phí và nhanh)

    steps:
    # 1. Tải source code của bạn từ GitHub về máy ảo
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Cài đặt môi trường .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Sửa lại cho khớp với version .NET bạn đang dùng (VD: 6.0.x, 7.0.x)

    # 3. Tải các thư viện (Nuget packages) như Dapper, MediatR...
    - name: Restore dependencies
      run: dotnet restore

    # 4. Biên dịch toàn bộ code (Build)
    - name: Build Source Code
      run: dotnet build --no-restore --configuration Release

    # 5. Chạy Unit Test (Nếu bạn có project Test)
    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal